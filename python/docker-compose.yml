version: "3.9"

services:
  # ── Application ─────────────────────────────────────────────
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    # Pipeline 不依赖 Kafka/ES/Redis，注释掉以避免不必要的服务启动
    # depends_on:
    #   kafka:
    #     condition: service_healthy
    #   elasticsearch:
    #     condition: service_healthy
    #   redis:
    #     condition: service_healthy
    restart: unless-stopped

  # ── API Gateway (CloudWeGo Hertz) ────────────────────────────
  gateway:
    build: ../gateway
    ports:
      - "8080:8080"
    environment:
      - HERTZ_PORT=8080
      - BACKEND_URL=http://api:8000
      - CORS_ORIGINS=*
      - RATE_LIMIT_RPS=100
    depends_on:
      - api
    restart: unless-stopped

